<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Study Mode</title>

<link rel="stylesheet"
href="study.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

<div class="glass-card">

<h1>Study Mode</h1>

<a href="index.html" class="back-btn">
← Dashboard
</a>

<div class="progress-section">

<div class="counter">
<span id="currentCard">0</span>
/
<span id="totalCards">0</span>
</div>

<div class="progress-bar">

<div class="progress"
id="progress"></div>

</div>

</div>

<div class="flashcard-container">

<div class="flashcard"
id="flashcard">

<div class="front"
id="front">
No Cards
</div>

<div class="back"
id="back">
Create Cards First
</div>

</div>

</div>

<div class="controls">

<button id="prevBtn">
⬅ Previous
</button>

<button id="flipBtn">
🔄 Flip
</button>

<button id="nextBtn">
Next ➡
</button>

</div>

<div class="extra-controls">

<button id="shuffleBtn">
🔀 Shuffle
</button>

<button id="deleteBtn">
🗑 Delete
</button>

</div>

<div class="shortcut">

SPACE = Flip |
← → = Navigate

</div>

</div>

</div>

<script src="study.js"></script>

</body>
</html>
